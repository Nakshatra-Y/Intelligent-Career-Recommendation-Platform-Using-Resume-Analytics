<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analysis System</title>
</head>

<body style="background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div style="color: white; font-family: sans-serif; text-align: center;">
        <h2>Loading AI Resume Analyzer...</h2>
        <div
            style="margin-top: 20px; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;">
        </div>
    </div>
    <script>
        window.location.href = "{{ url_for('auth') }}";
    </script>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
