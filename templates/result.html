<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result | AI Resume Analysis System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i class="fas fa-brain"></i> AI Resume Analyzer
            </div>
            <div class="nav-links">
                <a href="{{ url_for('upload') }}" class="nav-link">New Analysis</a>
            </div>
            <div class="user-info">
                <span id="displayUserName"></span>
                <button class="logout-btn" onclick="window.location.href='{{ url_for('logout') }}';"><i
                        class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <div class="section-header animate-fade">
            <h1>Analysis Result</h1>
            <p>Here's what our AI found in your resume.</p>
        </div>

        <div class="results-grid animate-fade" style="animation-delay: 0.1s;">
            <!-- Left Column: Profile Card -->
            <aside class="profile-card card">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <h2 id="candidateName">Loading...</h2>
                <p id="candidateEducation" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);"></p>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--glass-border);">

                <h3>Top Skills</h3>
                <div id="skillsContainer" class="skills-list" style="margin-top: 15px;">
                    <!-- Skills will be injected here -->
                </div>

                <div style="margin-top: 30px;">
                    <button class="btn btn-primary" onclick="window.location.href='{{ url_for('insights') }}';">
                        View Detailed Insights <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                    </button>
                </div>
            </aside>

            <!-- Right Column: Details -->
            <section class="details-section">
                <!-- AI Score & Roles -->
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 30px;">
                    <div class="card"
                        style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <h3 style="margin-bottom: 15px;"><i class="fas fa-chart-line"
                                style="color: var(--primary-color); margin-right: 10px;"></i> Resume Score</h3>
                        <div style="font-size: 3rem; font-weight: bold; color: var(--secondary-color);"
                            id="resumeScore">--</div>
                        <p style="margin-top: 5px; color: var(--text-muted); font-size: 0.9rem;">Out of 100</p>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-bullseye" style="color: var(--secondary-color); margin-right: 10px;"></i>
                            Suggested Roles</h3>
                        <ul id="jobRolesList"
                            style="margin-top: 15px; margin-left: 20px; line-height: 1.8; color: var(--text-main);">
                            <li>Loading roles...</li>
                        </ul>
                    </div>
                </div>

                <div class="card" style="margin-bottom: 30px;">
                    <h3><i class="fas fa-magic" style="color: var(--secondary-color); margin-right: 10px;"></i> AI
                        Summary</h3>
                    <p id="aiSummary" style="margin-top: 15px; line-height: 1.8; color: var(--text-main);"></p>
                </div>

                <div class="card">
                    <h3><i class="fas fa-briefcase" style="color: var(--primary-color); margin-right: 10px;"></i>
                        Experience</h3>
                    <p id="candidateExperience"
                        style="margin-top: 15px; line-height: 1.8; color: var(--text-main); font-size: 1.1rem;"></p>
                </div>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/result.js') }}"></script>
</body>

</html>
